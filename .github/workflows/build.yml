name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      BUILDOZER_USE_VENV: 0
      # 强制记录日志
      BUILDOZER_LOG_LEVEL: 2
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
        
    - name: Setup Android SDK
      run: |
        # 开启命令回显，方便调试
        set -x
        
        # 创建目录
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/platforms
        
        # 下载命令行工具
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/
        
        # 复制 sdkmanager
        cp /tmp/cmdline-tools/bin/* /home/runner/.buildozer/android/platform/android-sdk/tools/bin/
        chmod +x /home/runner/.buildozer/android/platform/android-sdk/tools/bin/*
        
        # 设置环境变量
        echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        
        # 安装 SDK 组件 (忽略部分错误，尽量继续)
        yes | /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
        /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" || echo "SDK安装可能有部分失败，尝试继续..."
        
    - name: Install Python dependencies
      run: |
        pip install --user --upgrade pip setuptools wheel
        pip install --user buildozer cython
        
    - name: Build with Buildozer
      run: |
        # 创建日志文件
        touch build.log
        
        # 生成配置
        echo "[app]" > buildozer.spec
        echo "title = Wallhaven" >> buildozer.spec
        echo "package.name = wallhaven" >> buildozer.spec
        echo "package.domain = org.wallhaven.app" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,atlas,json" >> buildozer.spec
        echo "version = 1.0" >> buildozer.spec
        echo "requirements = python3,kivy,requests" >> buildozer.spec
        echo "orientation = portrait" >> buildozer.spec
        echo "android.permissions = INTERNET" >> buildozer.spec
        echo "android.api = 33" >> buildozer.spec
        echo "android.minapi = 21" >> buildozer.spec
        echo "android.archs = arm64-v8a" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        
        # 运行 Buildozer 并同时输出到控制台和文件
        buildozer -v android debug 2>&1 | tee build.log
        
        # 检查结果
        if [ -f bin/*.apk ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
        else
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            echo "编译失败，打印最后日志："
            tail -n 100 build.log
            exit 1
        fi
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Wallhaven-APK
        path: bin/*.apk
        
    - name: Upload Build Log
      if: always()  # 无论成功失败都上传日志
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
