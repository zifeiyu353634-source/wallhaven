name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      # 关键：告诉 Buildozer 不要自己下载 NDK，用 GitHub 自带的
      ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
      ANDROID_NDK: ${{ env.ANDROID_NDK_LATEST_HOME }}
      # 关键：告诉 Buildozer 也不要自己下载 SDK，用 GitHub 自带的
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev
        
    - name: Install Python dependencies
      run: |
        pip install --user --upgrade pip setuptools wheel
        pip install --user buildozer cython virtualenv
        
    - name: Build with Buildozer
      run: |
        # 设置 buildozer 不使用虚拟环境
        export BUILDOZER_USE_VENV=0
        
        # 创建 buildozer.spec (如果不存在)
        # 强制指定使用系统环境，不下载
        if [ ! -f buildozer.spec ]; then
          echo "[app]" > buildozer.spec
          echo "title = Wallhaven" >> buildozer.spec
          echo "package.name = wallhaven" >> buildozer.spec
          echo "package.domain = org.wallhaven.app" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "version = 1.0" >> buildozer.spec
          echo "requirements = python3,kivy,requests" >> buildozer.spec
          echo "android.permissions = INTERNET" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          # 使用 GitHub 最新的 API 级别
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.archs = arm64-v8a,armeabi-v7a" >> buildozer.spec
          # 关键配置：指向系统路径
          echo "android.ndk = $ANDROID_NDK_HOME" >> buildozer.spec
          echo "android.sdk_path = $ANDROID_SDK_ROOT" >> buildozer.spec
          # 允许使用预览版 SDK
          echo "android.accept_sdk_license = True" >> buildozer.spec
        fi
        
        # 验证环境
        echo "Using NDK at: $ANDROID_NDK_HOME"
        echo "Using SDK at: $ANDROID_SDK_ROOT"
        ls -la $ANDROID_SDK_ROOT
        
        # 运行 buildozer
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wallhaven-apk
        path: bin/*.apk
