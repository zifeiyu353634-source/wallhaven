name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Setup Android Environment
      run: |
        # 设置环境变量
        echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
        echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        
        # 验证路径是否存在
        echo "检查 NDK 路径:"
        ls -la /usr/local/lib/android/sdk/ndk/ || echo "NDK 目录不存在"
        echo "检查 SDK 路径:"
        ls -la /usr/local/lib/android/sdk/ || echo "SDK 目录不存在"
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev
        
    - name: Install Python dependencies
      run: |
        pip install --user --upgrade pip setuptools wheel
        pip install --user buildozer cython virtualenv
        
    - name: Build with Buildozer
      run: |
        # 设置 buildozer 不使用虚拟环境
        export BUILDOZER_USE_VENV=0
        
        # 创建 buildozer.spec (如果不存在)
        if [ ! -f buildozer.spec ]; then
          echo "[app]" > buildozer.spec
          echo "title = Wallhaven" >> buildozer.spec
          echo "package.name = wallhaven" >> buildozer.spec
          echo "package.domain = org.wallhaven.app" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "version = 1.0" >> buildozer.spec
          echo "requirements = python3,kivy,requests" >> buildozer.spec
          echo "android.permissions = INTERNET" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.archs = arm64-v8a,armeabi-v7a" >> buildozer.spec
          # 关键配置：指向系统路径
          echo "android.ndk = $ANDROID_NDK_HOME" >> buildozer.spec
          echo "android.sdk_path = $ANDROID_SDK_ROOT" >> buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec
        fi
        
        # 验证环境
        echo "使用 NDK 路径: $ANDROID_NDK_HOME"
        echo "使用 SDK 路径: $ANDROID_SDK_ROOT"
        
        # 运行 buildozer
        buildozer -v android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wallhaven-apk
        path: bin/*.apk
