name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04  # 使用更稳定的 Ubuntu 22.04 版本
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      DEBIAN_FRONTEND: noninteractive  # 避免交互式提示
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        # 更新系统源
        sudo apt-get update -y
        sudo apt-get upgrade -y
        
        # 安装基础依赖
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev
        
        # 升级 pip
        pip install --user --upgrade pip setuptools wheel
        
        # 安装 Python 依赖
        pip install --user buildozer cython virtualenv
        
    - name: Build with Buildozer
      run: |
        # 设置 buildozer 环境变量
        export BUILDOZER_USE_VENV=0
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wallhaven-apk
        path: bin/*.apk
