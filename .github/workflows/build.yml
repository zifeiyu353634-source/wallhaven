name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      BUILDOZER_USE_VENV: 0
      # 开启多线程编译，加快速度
      BUILDOZER_ANDROID_COMPILE_THREADS: 4
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
        
    - name: Setup Android SDK
      run: |
        mkdir -p /home/runner/.buildozer/android/platform
        ln -s /usr/local/lib/android/sdk /home/runner/.buildozer/android/platform/android-sdk
        echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        
    - name: Install Python dependencies
      run: |
        pip install --user --upgrade pip setuptools wheel
        pip install --user buildozer cython
        
    - name: Build with Buildozer
      id: build
      run: |
        # 生成配置文件
        echo "[app]" > buildozer.spec
        echo "title = Wallhaven" >> buildozer.spec
        echo "package.name = wallhaven" >> buildozer.spec
        echo "package.domain = org.wallhaven.app" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,atlas,json" >> buildozer.spec
        echo "version = 1.0" >> buildozer.spec
        echo "requirements = python3,kivy,requests,urllib3,certifi,charset-normalizer,idna,Pillow" >> buildozer.spec
        echo "orientation = portrait" >> buildozer.spec
        echo "fullscreen = 0" >> buildozer.spec
        echo "android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE" >> buildozer.spec
        echo "android.api = 33" >> buildozer.spec
        echo "android.minapi = 21" >> buildozer.spec
        echo "android.archs = arm64-v8a,armeabi-v7a" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        echo "warn_on_root = 1" >> buildozer.spec
        
        # 运行编译 (输出日志到 build.log)
        echo "开始编译..."
        buildozer -v android debug > build.log 2>&1
        
        # 检查是否生成了 APK
        if [ -f bin/*.apk ]; then
            echo "编译成功！APK 已生成。"
            echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
        else
            echo "编译失败！未找到 APK 文件。"
            echo "BUILD_SUCCESS=false" >> $GITHUB_OUTPUT
            # 打印日志最后 100 行方便查看错误
            echo "--- 最后的日志 ---"
            tail -n 100 build.log
            exit 1
        fi
        
    - name: Upload APK
      if: steps.build.outputs.BUILD_SUCCESS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Wallhaven-APK
        path: bin/*.apk
        
    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
