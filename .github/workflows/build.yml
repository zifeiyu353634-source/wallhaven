name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      BUILDOZER_USE_VENV: 0
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
        
    - name: Setup Android SDK
      run: |
        # 创建 Buildozer 期望的目录结构
        mkdir -p /home/runner/.buildozer/android/platform
        
        # 创建符号链接，将 Buildozer 的 SDK 路径指向系统预装的 SDK
        ln -s /usr/local/lib/android/sdk /home/runner/.buildozer/android/platform/android-sdk
        
        # 验证链接
        echo "验证 SDK 路径:"
        ls -la /home/runner/.buildozer/android/platform/android-sdk/
        echo "验证 build-tools:"
        ls -la /home/runner/.buildozer/android/platform/android-sdk/build-tools/ || echo "build-tools 不存在"
        
        # 设置环境变量
        echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        
    - name: Install Python dependencies
      run: |
        pip install --user --upgrade pip setuptools wheel
        pip install --user buildozer==1.5.0 cython
        
    - name: Build with Buildozer
      run: |
        # 创建 buildozer.spec
        cat > buildozer.spec << 'EOF'
[app]
title = Wallhaven
package.name = wallhaven
package.domain = org.wallhaven.app
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,json
version = 1.0
requirements = python3,kivy,requests,urllib3,certifi,charset-normalizer,idna,Pillow
orientation = portrait
fullscreen = 0
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE
android.api = 33
android.minapi = 21
android.archs = arm64-v8a,armeabi-v7a
android.accept_sdk_license = True
[buildozer]
log_level = 2
warn_on_root = 1
EOF
        
        # 运行 buildozer
        buildozer -v android debug 2>&1 | tee build.log
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: wallhaven-apk
        path: bin/*.apk
        
    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
